defaults:
  - config
  - override hydra/launcher: submitit_slurm

hydra:
  launcher:
    partition: ${oc.env:SLURM_PARTITION,gpu}
    qos: ${oc.env:SLURM_QOS,normal}
    name: ${model.name}_${dataset}
    timeout_min: 1440
    cpus_per_task: 8
    mem_gb: 100
    gpus_per_node: 1
    # Default in hydra-submitit-launcher is 0 → submitit refuses to requeue on
    # SIGUSR2 timeout. Set to 3 so a job that hits the 24h wall can be
    # auto-requeued up to 3 times. trainer.fit() resumes from last.ckpt via
    # benchmarks/run.py's auto-resume logic.
    max_num_timeout: 3
    # Cap concurrent SLURM array tasks. Sized for the seed sweep (~600 jobs):
    # large enough to make progress, small enough to leave 3090-gcondo headroom
    # for other users. Override per-launch with hydra.launcher.array_parallelism=N.
    array_parallelism: 32
