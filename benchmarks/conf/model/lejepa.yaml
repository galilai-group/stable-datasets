name: lejepa
forward: lejepa_forward

transforms:
  type: multicrop
  num_global: 2
  num_local: 6

loss:
  lamb: 0.02
  t_max: 3.0
  n_points: 17
  num_slices: 1024


params:
  default:
    batch_size: 256
    max_epochs: 63
    # 8 views per sample (2 global + 6 local) at 224×224 OOMs a 22GB
    # 3090 with bs=256. Keep effective batch size 256 by accumulating
    # over 8 micro-batches of 32. Per-dataset blocks inherit this unless
    # they override.
    accumulate_grad_batches: 8
  # CIFAR-scale (32x32)
  cifar10:
    batch_size: 256
    max_epochs: 250
  cifar100:
    batch_size: 256
    max_epochs: 250
  svhn:
    batch_size: 256
    max_epochs: 188
  # Grayscale 28x28
  fashionmnist:
    batch_size: 256
    max_epochs: 188
  emnist:
    batch_size: 256
    max_epochs: 188
  kmnist:
    batch_size: 256
    max_epochs: 188
  notmnist:
    batch_size: 256
    max_epochs: 250
  pneumoniamnist:
    batch_size: 256
    max_epochs: 250
  # Other small datasets
  arabiccharacters:
    batch_size: 256
    max_epochs: 313
  arabicdigits:
    batch_size: 256
    max_epochs: 313
  # Larger resolution
  stl10:
    batch_size: 256
    max_epochs: 188
  # Small fine-grained
  flowers102:
    batch_size: 256
    max_epochs: 375
  cub200:
    batch_size: 256
    max_epochs: 375
  dtd:
    batch_size: 256
    max_epochs: 375
  country211:
    batch_size: 256
    max_epochs: 250
  rockpaperscissor:
    batch_size: 256
    max_epochs: 375
  # Large datasets
  food101:
    batch_size: 256
    max_epochs: 125
  tinyimagenet:
    batch_size: 256
    max_epochs: 125
  imagenette:
    batch_size: 256
    accumulate_grad_batches: 8
    max_epochs: 188

  # ----- new datasets (auto-inserted, paper tier rule) -----
  # 1× ImageNet base
  imagenet100:
    batch_size: 256
    max_epochs: 63
  # Medium-simple — ×3
  emnist_byclass:
    batch_size: 256
    max_epochs: 189
  emnist_bymerge:
    batch_size: 256
    max_epochs: 189
  emnist_digits:
    batch_size: 256
    max_epochs: 189
  emnist_letters:
    batch_size: 256
    max_epochs: 189
  emnist_mnist:
    batch_size: 256
    max_epochs: 189
  hasyv2:
    batch_size: 256
    max_epochs: 189
  # Medium-hard — ×4
  awa2:
    batch_size: 256
    max_epochs: 252
  galaxy10:
    batch_size: 256
    max_epochs: 252
  bloodmnist:
    batch_size: 256
    max_epochs: 252
  breastmnist:
    batch_size: 256
    max_epochs: 252
  dermamnist:
    batch_size: 256
    max_epochs: 252
  octmnist:
    batch_size: 256
    max_epochs: 252
  organamnist:
    batch_size: 256
    max_epochs: 252
  organcmnist:
    batch_size: 256
    max_epochs: 252
  organsmnist:
    batch_size: 256
    max_epochs: 252
  pathmnist:
    batch_size: 256
    max_epochs: 252
  retinamnist:
    batch_size: 256
    max_epochs: 252
  tissuemnist:
    batch_size: 256
    max_epochs: 252
  # Fine-grained — ×6
  cars196:
    batch_size: 256
    max_epochs: 378
  fgvcaircraft_family:
    batch_size: 256
    max_epochs: 378
  fgvcaircraft_manufacturer:
    batch_size: 256
    max_epochs: 378

vit_optimizer:
  type: AdamW
  lr: 5e-4
  weight_decay: 0.05
  betas: [0.9, 0.999]

scheduler:
  type: LinearWarmupCosineAnnealing
