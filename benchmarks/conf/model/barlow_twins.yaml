name: barlow_twins
forward: barlow_twins_forward

transforms:
  type: multiview
  num_views: 2

projector:
  hidden_dim: 2048
  output_dim: 2048

loss:
  lambda_coeff: 0.005


params:
  default:
    batch_size: 256
    max_epochs: 50
    accumulate_grad_batches: 1
  # CIFAR-scale (32x32) — tier 4 (×4)
  cifar10:
    batch_size: 256
    max_epochs: 200
  cifar100:
    batch_size: 256
    max_epochs: 200
  svhn:
    batch_size: 256
    max_epochs: 150
  # Grayscale 28x28
  fashionmnist:
    batch_size: 256
    max_epochs: 150
  emnist:
    batch_size: 256
    max_epochs: 150
  kmnist:
    batch_size: 256
    max_epochs: 150
  notmnist:
    batch_size: 256
    max_epochs: 200
  medmnist:
    batch_size: 256
    max_epochs: 200
  # Other small datasets — tier 3 (×3)
  arabiccharacters:
    batch_size: 256
    max_epochs: 250
  arabicdigits:
    batch_size: 256
    max_epochs: 250
  # Larger resolution — tier 3 (×3)
  stl10:
    batch_size: 256
    max_epochs: 150
  # Small fine-grained — tier 6 (×6)
  flowers102:
    batch_size: 256
    max_epochs: 300
  cub200:
    batch_size: 256
    max_epochs: 300
  dtd:
    batch_size: 256
    max_epochs: 300
  country211:
    batch_size: 256
    max_epochs: 200
  rockpaperscissor:
    batch_size: 256
    max_epochs: 300
  # Large datasets
  food101:
    batch_size: 256
    max_epochs: 100
  tinyimagenet:
    batch_size: 256
    max_epochs: 100
  imagenette:
    batch_size: 256
    max_epochs: 150

vit_optimizer:
  type: AdamW
  lr: 1.5e-4
  weight_decay: 0.05
  betas: [0.9, 0.999]

scheduler:
  type: LinearWarmupCosineAnnealing
