defaults:
  - model: simclr
  - _self_

backbone: vit_small_patch16_224
dataset: cifar10
seed: null  # set to an int to run a seeded ablation (tagged "seed" in wandb)
run_tag: null  # extra wandb tag for this run (e.g. "final_runs")
data_dir: ${oc.env:STABLE_DATASETS_ROOT,/oscar/home/sboughan/scratch/.stable-datasets}  # set STABLE_DATASETS_ROOT in shell to relocate dataset+ckpt root
smoke_test: false  # run 3 train + 3 val batches for 1 epoch to verify the pipeline works

checkpoint:
  dir: ${oc.env:STABLE_DATASETS_ROOT,/oscar/home/sboughan/scratch/.stable-datasets}/.pretrain_checkpoints
  every_n_epochs: 10
  train_time_interval_hours: 2  # wall-clock save to survive SLURM timeouts
  save_last: true
  monitor: "eval/linear_probe_top1"
  mode: "max"
  save_top_k: 1

training:
  max_epochs: 50
  precision: "16-mixed"
  batch_size: 256
  accumulate_grad_batches: 1
  num_workers: 8
  prefetch_factor: 4

wandb:
  enabled: true
  entity: samibg
  project: finalized-stable-datasets

hydra:
  run:
    dir: ${oc.env:PROJECT_ROOT,/oscar/home/sboughan/scratch/.stable-datasets}/benchmark-runs/${model.name}_${backbone}_${dataset}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ${oc.env:PROJECT_ROOT,/oscar/home/sboughan/scratch/.stable-datasets}/benchmark-runs/sweep/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${model.name}_${backbone}_${dataset}
