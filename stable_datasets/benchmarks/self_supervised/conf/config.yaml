defaults:
  - model: simclr
  - backbone: vit_small
  - _self_

dataset: cifar10
seed: null  # set to an int to run a seeded ablation (tagged "seed" in wandb)
run_tag: null  # extra wandb tag for this run (e.g. "final_runs")
skip_datasets: []  # extra datasets to skip at runtime (e.g. [shapes3d, food101])
data_dir: /oscar/home/sboughan/scratch/.stable-datasets  # override to set download/cache root
cache_dir: null  # pre-cached 224x224 numpy memmaps (null to disable)
smoke_test: false  # run 3 train + 3 val batches for 1 epoch to verify the pipeline works

checkpoint:
  dir: /oscar/home/sboughan/scratch/.stable-datasets/.pretrain_checkpoints
  every_n_epochs: 50
  save_last: true
  monitor: "eval/linear_probe_top1"
  mode: "max"
  save_top_k: 1

training:
  max_epochs: 50
  precision: "16-mixed"
  batch_size: 256
  accumulate_grad_batches: 1
  num_workers: 8
  prefetch_factor: 4

wandb:
  enabled: true
  entity: samibg
  project: finalized-stable-datasets

hydra:
  run:
    dir: ${oc.env:PROJECT_ROOT,/oscar/home/sboughan/scratch/.stable-datasets}/benchmark-runs/${model.name}_${backbone.name}_${dataset}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ${oc.env:PROJECT_ROOT,/oscar/home/sboughan/scratch/.stable-datasets}/benchmark-runs/sweep/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${model.name}_${backbone.name}_${dataset}
